<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>yomimono</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2a2118;
    --ink-light: #6b5c4a;
    --ink-faint: #c4b8a8;
    --paper: #faf9f7;
    --paper-dark: #f0ede8;
    --paper-darker: #e5e0d8;
    --accent: #8b4513;
    --accent-light: #c17f50;
    --accent-pale: #f0e4d4;
    --stamp-book: #4a6741;
    --stamp-film: #2c4a6b;
    --stamp-anime: #6b3a6b;
    --stamp-tv: #6b4a1a;
    --stamp-read: #3a5a3a;
    --red: #c0392b;
    --gold: #b8860b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Old Mincho', serif;
    background-color: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--ink);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(42,33,24,0.35);
  }

  .logo {
    font-family: 'Zen Old Mincho', serif;
    font-style: italic;
    font-size: 1.6rem;
    color: var(--paper);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo span {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    font-style: normal;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    border: 1px solid var(--ink-faint);
    padding: 2px 6px;
    border-radius: 2px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .stat-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
  }

  /* ─── MAIN LAYOUT ─── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* ─── FILTERS ─── */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .search-wrap {
    flex: 1;
    min-width: 44px; max-width: 44px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 14px 9px 32px;
    border: 1.5px solid var(--paper-darker);
    background: white;
    border-radius: 4px;
    font-family: 'Zen Old Mincho', serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent-light); }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
    opacity: 0.5;
    pointer-events: none;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 14px;
    border: 1.5px solid var(--paper-darker);
    background: var(--paper-dark);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: var(--ink-light);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { background: var(--paper-darker); }
  .tab.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .tab[data-type="本"].active { background: #8FBF8A; border-color: #8FBF8A; color: #2a4a27; }
  .tab[data-type="鑑賞"].active { background: #C9A0D4; border-color: #C9A0D4; color: #4a2a52; }
  .tab[data-type="いろいろ"].active { background: #c4a97a; border-color: #c4a97a; color: #4a3010; }

  /* ─── ADD BUTTON ─── */
  .btn-add {
    background: white;
    color: var(--ink);
    border: 1.5px solid var(--paper-darker);
    border: none;
    padding: 9px 18px;
    border-radius: 3px;
    font-family: 'Zen Old Mincho', serif;
    font-size: 0.88rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--paper-dark); }

  /* ─── COUNT ─── */
  .count-line {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  /* ─── ENTRY CARD ─── */
  .entries {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .entry-card {
    background: white;
    border: 1px solid var(--paper-darker);
    border-radius: 4px;
    padding: 16px 18px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    position: relative;
    transition: box-shadow 0.2s;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity:1; transform:none; } }
  .entry-card:hover { box-shadow: 0 3px 14px rgba(42,33,24,0.1); }

  /* left color bar */
  .entry-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 4px 0 0 4px;
  }
  .entry-card[data-type="本"]::before { background: #8FBF8A; }

  .entry-card[data-type="鑑賞"]::before { background: #C9A0D4; }
  .entry-card[data-type="いろいろ"]::before { background: var(--stamp-tv); }
  .entry-card

  .entry-cover {
    width: 100px;
    height: 150px;
    flex-shrink: 0;
    background: var(--paper-dark);
    border: 1px solid var(--paper-darker);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--ink-faint); letter-spacing: 0.05em;
    overflow: hidden;
  }
  .entry-cover img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .entry-body { flex: 1; min-width: 0; }

  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 4px;
  }

  .entry-title {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
  }

  .type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 2px;
    flex-shrink: 0;
    color: white;
    margin-top: 2px;
  }
  [data-type="本"] .type-badge { background: #8FBF8A; color: #2a4a27; }
  [data-type="鑑賞"] .type-badge { background: #C9A0D4; color: #4a2a52; }
  [data-type="いろいろ"] .type-badge { background: var(--stamp-tv); }
  

  .entry-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .stars {
    color: var(--gold);
    font-size: 0.9rem;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: inline-block;
  }

  .entry-note {
    font-size: 0.85rem;
    line-height: 1.75;
    color: var(--ink-light);
    border-left: 2px solid var(--paper-darker);
    padding-left: 10px;
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .entry-status {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 2px;
    margin-top: 8px;
    border: 1px solid;
  }
  .status-done { color: var(--stamp-read); border-color: var(--stamp-read); background: #edf4ec; }
  .status-wip { color: var(--accent); border-color: var(--accent-light); background: var(--accent-pale); }
  .status-plan { color: var(--ink-faint); border-color: var(--ink-faint); background: var(--paper-dark); }

  .entry-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .btn-icon {
    background: none;
    border: 1px solid var(--paper-darker);
    border-radius: 3px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 0.8rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-light);
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--paper-dark); border-color: var(--ink-faint); }
  .btn-icon.delete:hover { background: #fdf0f0; border-color: #e88; color: var(--red); }

  /* ─── MODAL ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(42,33,24,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--paper);
    border-radius: 6px;
    padding: 28px 28px 120px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 31px,
        rgba(180,160,130,0.18) 31px,
        rgba(180,160,130,0.18) 32px
      );
    box-shadow: 0 8px 40px rgba(42,33,24,0.3);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity:0; } }

  .modal h2 {
    font-family: 'Zen Old Mincho', serif;
    font-style: italic;
    font-size: 1.2rem;
    margin-bottom: 20px;
    color: var(--ink);
  }

  .form-row {
    margin-bottom: 14px;
  }
  .form-row label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    margin-bottom: 5px;
  }
  .form-row input,
  .form-row select,
  .form-row textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--paper-darker);
    border-radius: 3px;
    font-family: 'Zen Old Mincho', serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus { border-color: var(--accent-light); }
  .form-row textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

  .form-row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .star-input { display: flex; gap: 4px; }
  .star-btn {
    font-size: 1.3rem;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-faint);
    transition: color 0.1s;
    line-height: 1;
  }
  .star-btn.on { color: var(--gold); }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-cancel {
    background: none;
    border: 1.5px solid var(--paper-darker);
    padding: 8px 18px;
    border-radius: 3px;
    font-family: 'Zen Old Mincho', serif;
    cursor: pointer;
    color: var(--ink-light);
  }
  .btn-cancel:hover { background: var(--paper-dark); }
  .btn-save {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 8px 20px;
    border-radius: 3px;
    font-family: 'Zen Old Mincho', serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--accent); }

  /* ─── EMPTY STATE ─── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
  }
  .empty p { margin-top: 12px; font-size: 0.9rem; }

  /* ─── DETAIL PAGE ─── */
  .detail-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--paper);
    z-index: 300;
    overflow-y: auto;
    animation: slideInRight 0.22s ease;
  }
  @keyframes slideInRight { from { transform: translateX(30px); opacity:0; } to { transform:none; opacity:1; } }
  .detail-overlay.open { display: block; }

  .detail-header {
    background: var(--ink);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .btn-back {
    background: none;
    border: none;
    color: var(--paper);
    font-family: 'Zen Old Mincho', serif;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.8;
    padding: 0;
  }
  .btn-back:hover { opacity: 1; }
  .detail-header-actions { display: flex; gap: 8px; }
  .btn-detail-action {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--paper);
    padding: 5px 14px;
    border-radius: 3px;
    font-family: 'Zen Old Mincho', serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-detail-action:hover { background: rgba(255,255,255,0.1); }
  .btn-detail-action.danger { border-color: rgba(200,80,80,0.5); color: #f5a0a0; }
  .btn-detail-action.danger:hover { background: rgba(200,80,80,0.15); }

  .detail-body {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .detail-cover-wrap {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    margin-bottom: 28px;
  }
  .detail-cover {
    width: 120px;
    height: 175px;
    flex-shrink: 0;
    background: var(--paper-dark);
    border: 1px solid var(--paper-darker);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--ink-faint);
    overflow: hidden;
  }
  .detail-cover img { width:100%; height:100%; object-fit:cover; }

  .detail-info { flex: 1; min-width: 0; padding-top: 4px; }
  .detail-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 2px;
    color: white;
    display: inline-block;
    margin-bottom: 10px;
  }
  .detail-title {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .detail-author {
    font-size: 0.9rem;
    color: var(--ink-light);
    margin-bottom: 10px;
  }
  .detail-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .detail-stars { font-size: 1rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; }
  .detail-status {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 2px;
    border: 1px solid;
  }

  .detail-divider {
    border: none;
    border-top: 1px solid var(--paper-darker);
    margin: 24px 0;
  }
  .detail-note {
    font-size: 0.95rem;
    line-height: 2;
    color: var(--ink-light);
    white-space: pre-wrap;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--paper-dark); }
  ::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-actions">
    <span class="stat-chip" id="headerStat"></span>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="" oninput="render()">
    </div>
    <div class="filter-tabs">
      <button class="tab active" onclick="setTab('すべて',this)">すべて</button>
      <button class="tab" data-type="本" onclick="setTab('本',this)">本</button>
      <button class="tab" data-type="鑑賞" onclick="setTab('鑑賞',this)">鑑賞</button>
      <button class="tab" data-type="いろいろ" onclick="setTab('いろいろ',this)">いろいろ</button>
      <button class="tab" onclick="setTab('完',this)">完</button>
      <button class="tab" onclick="setTab('完＋感想',this)">完＋感想</button>
      <button class="tab" onclick="setTab('進行中',this)">in progress</button>
    </div>
    <button class="btn-add" onclick="openModalWithAuth()">＋ 追加</button>
  </div>

  <div class="entries" id="entriesEl"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <h2 id="modalTitle">新しい記録を追加</h2>
    <div class="form-row">
      <label>カバー画像</label>
      <div id="coverPreviewWrap" style="margin-bottom:8px;display:none">
        <img id="coverPreview" style="width:72px;height:100px;object-fit:cover;border-radius:2px;border:1px solid var(--paper-darker);">
      </div>
      <input id="fCover" type="file" accept="image/*" onchange="previewCover(this)" style="font-size:0.82rem;">
    </div>
    <div class="form-row">
      <label>タイトル</label>
      <input id="fTitle" type="text" placeholder="作品名">
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>種類</label>
        <select id="fType">
          <option>本</option>
          <option>鑑賞</option>
          <option>いろいろ</option>
        </select>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>ステータス</label>
        <select id="fStatus">
          <option value="完">完</option>
          <option value="完＋感想">完＋感想</option>
          <option value="進行中">進行中</option>
          <option value="予定">予定</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>著者・監督・制作</label>
      <input id="fAuthor" type="text" placeholder="著者名や監督名など">
    </div>
    <div class="form-row">
      <label>年</label>
      <input id="fStart" type="text" placeholder="例：2026" maxlength="4" style="width:120px;">
    </div>
    <div class="form-row">
      <label>メモ・感想</label>
      <textarea id="fNote" placeholder="感じたこと、印象に残ったシーン、引用など…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-cancel" id="btnDelete" onclick="deleteFromModal()" style="color:#c0392b;border-color:#e8a0a0;display:none">削除</button>
      <button class="btn-save" onclick="save()">保存する</button>
    </div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-header">
    <button class="btn-back" onclick="closeDetail()">← 戻る</button>
    <div class="detail-header-actions">
      <button class="btn-detail-action" onclick="editFromDetail()">編集</button>
    </div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>
const SUPABASE_URL = 'https://wbyheriqjejclnldfhji.supabase.co';
const SUPABASE_KEY = 'sb_publishable__IE6VC8thX9_ivRTVNQdwQ_peDeAEKW';

async function dbFetch(path, opts) {
  opts = opts || {};
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: opts.method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
    },
    body: opts.body || undefined,
  });
  if (!res.ok) { const t = await res.text(); console.error(t); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadFromDB() {
  const data = await dbFetch('entries?order=created.desc&select=*');
  if (data) {
    entries = data.map(function(r) {
      return { id: r.id, type: r.type, title: r.title, author: r.author,
        status: r.status, start: r.start_date, end: r.end_date,
        note: r.note, cover: r.cover, created: r.created };
    });
  }
  render();
}

async function saveToDB(entry) {
  var row = { id: entry.id, type: entry.type, title: entry.title, author: entry.author,
    status: entry.status, start_date: entry.start, end_date: entry.end,
    note: entry.note, cover: entry.cover || null, created: entry.created };
  await dbFetch('entries?on_conflict=id', {
    method: 'POST',
    prefer: 'resolution=merge-duplicates',
    body: JSON.stringify(row),
  });
}

async function deleteFromDB(id) {
  await dbFetch('entries?id=eq.' + id, { method: 'DELETE' });
}

const TYPE_EMOJI = { '本': '本', '鑑賞': '鑑', 'いろいろ': '他' };

var entries = [];
var currentTab = 'すべて';
var editingId = null;

function load() { loadFromDB(); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  render();
}

function render() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var filtered = entries.filter(function(e) {
    var matchTab = currentTab === 'すべて' ? true :
      currentTab === '完' ? e.status === '完' : currentTab === '完＋感想' ? e.status === '完＋感想' :
      currentTab === '進行中' ? e.status === '進行中' : e.type === currentTab;
    var matchQ = !q || [e.title, e.author, e.note].some(function(s) { return s && s.toLowerCase().includes(q); });
    return matchTab && matchQ;
  }).sort(function(a, b) { return b.created - a.created; });

  document.getElementById('headerStat').textContent = entries.length + ' records';

  var el = document.getElementById('entriesEl');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty"><p>記録がありません</p></div>';
    return;
  }

  el.innerHTML = filtered.map(function(e) {
    var statusClass = (e.status === '完' || e.status === '完＋感想') ? 'status-done' : e.status === '進行中' ? 'status-wip' : 'status-plan';
    var dateStr = [formatDate(e.start), e.end && e.end !== e.start ? formatDate(e.end) : ''].filter(Boolean).join(' → ');
    var coverHtml = e.cover ? '<img src="' + e.cover + '" style="width:100%;height:100%;object-fit:cover;border-radius:2px;">' : TYPE_EMOJI[e.type];
    return '<div class="entry-card" data-type="' + e.type + '" data-id="' + e.id + '" onclick="openDetail(this.dataset.id)" style="cursor:pointer;">' +
      '<div class="entry-cover">' + coverHtml + '</div>' +
      '<div class="entry-body">' +
      '<div class="entry-top"><div class="entry-title">' + escHtml(e.title) + '</div>' +
      '<span class="type-badge">' + e.type + '</span></div>' +
      '<div class="entry-meta">' + (e.author ? escHtml(e.author) + '　' : '') + dateStr + '</div>' +
      (e.note ? '<div class="entry-note">' + escHtml(e.note) + '</div>' : '') +
      '<span class="entry-status ' + statusClass + '">' + e.status + '</span>' +
      '</div></div>';
  }).join('');
}

function formatDate(d) {
  if (!d) return '';
  return d.split('-')[0];
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openModalWithAuth() {
  var pw = prompt('パスワードを入力してください');
  if (pw === null) return;
  if (pw !== '060912') { alert('パスワードが違います'); return; }
  openModal(null);
}

function openModal(entry) {
  editingId = entry ? entry.id : null;
  document.getElementById('modalTitle').textContent = entry ? '記録を編集' : '新しい記録を追加';
  document.getElementById('fTitle').value = entry ? entry.title || '' : '';
  document.getElementById('fType').value = entry ? entry.type || '本' : '本';
  document.getElementById('fStatus').value = entry ? entry.status || '完' : '完';
  document.getElementById('fAuthor').value = entry ? entry.author || '' : '';
  document.getElementById('fStart').value = entry ? entry.start || '' : '';

  document.getElementById('fNote').value = entry ? entry.note || '' : '';
  window._editCover = entry ? entry.cover || null : null;
  var wrap = document.getElementById('coverPreviewWrap');
  var prev = document.getElementById('coverPreview');
  if (entry && entry.cover) { prev.src = entry.cover; wrap.style.display = 'block'; }
  else { wrap.style.display = 'none'; prev.src = ''; }
  document.getElementById('fCover').value = '';
  window._newCover = undefined;
  document.getElementById('btnDelete').style.display = entry ? 'block' : 'none';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fTitle').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
  window._newCover = undefined;
  window._editCover = null;
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

async function save() {
  var title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }
  var data = {
    type: document.getElementById('fType').value,
    title: title,
    author: document.getElementById('fAuthor').value.trim(),
    status: document.getElementById('fStatus').value,
    start: document.getElementById('fStart').value,
    end: '',
    note: document.getElementById('fNote').value.trim(),
    cover: window._newCover !== undefined ? window._newCover : (window._editCover || null),
  };
  if (editingId) {
    var idx = entries.findIndex(function(e) { return e.id === editingId; });
    if (idx !== -1) { entries[idx] = Object.assign({}, entries[idx], data); }
    await saveToDB(entries[idx !== -1 ? idx : 0]);
  } else {
    var newEntry = Object.assign({ id: uid(), created: Date.now() }, data);
    entries.unshift(newEntry);
    await saveToDB(newEntry);
  }
  closeModal();
  render();
}

async function deleteFromModal() {
  if (!confirm('この記録を削除しますか？')) return;
  await deleteFromDB(editingId);
  entries = entries.filter(function(e) { return e.id !== editingId; });
  closeModal();
  render();
}

var currentDetailId = null;

function openDetail(id) {
  var e = entries.find(function(x) { return x.id === id; });
  if (!e) return;
  currentDetailId = id;
  var typeColor = { '本': {bg:'#D2EECC', border:'#8FBF8A', text:'#2a4a27'}, '鑑賞': {bg:'#E8CCEE', border:'#C9A0D4', text:'#4a2a52'}, 'いろいろ': {bg:'#e8e0d0', border:'#c4a97a', text:'#4a3010'} };
  var tc = typeColor[e.type] || {bg:'#f0ece4', border:'#c4b8a8', text:'#6b5c4a'};
  var tcStyle = 'color:' + tc.text + ';border-color:' + tc.border + ';background:' + tc.bg;
  var STATUS_STYLE = { '完': tcStyle, '完＋感想': tcStyle, '進行中': tcStyle, '予定': 'color:#9a9080;border-color:#c4b8a8;background:#f0ece4' };
  var dateStr = [formatDate(e.start), e.end && e.end !== e.start ? formatDate(e.end) : ''].filter(Boolean).join(' → ');
  var color = tc.bg;
  var textColor = tc.text;
  document.getElementById('detailBody').innerHTML =
    '<div class="detail-cover-wrap">' +
    '<div class="detail-cover">' + (e.cover ? '<img src="' + e.cover + '">' : '<span>' + TYPE_EMOJI[e.type] + '</span>') + '</div>' +
    '<div class="detail-info">' +
    '<span class="detail-type-badge" style="background:' + color + ';color:' + textColor + '">' + e.type + '</span>' +
    '<div class="detail-title">' + escHtml(e.title) + '</div>' +
    (e.author ? '<div class="detail-author">' + escHtml(e.author) + '</div>' : '') +
    (dateStr ? '<div class="detail-date">' + dateStr + '</div>' : '') +
    '<span class="detail-status" style="' + (STATUS_STYLE[e.status] || '') + '">' + e.status + '</span>' +
    '</div></div>' +
    (e.note ? '<hr class="detail-divider"><div class="detail-note">' + escHtml(e.note) + '</div>' : '');
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentDetailId = null;
}

function editFromDetail() {
  var pw = prompt('パスワードを入力してください');
  if (pw === null) return;
  if (pw !== '060912') { alert('パスワードが違います'); return; }
  var e = entries.find(function(x) { return x.id === currentDetailId; });
  if (e) { closeDetail(); openModal(e); }
}

async function deleteFromDetail() {
  if (!confirm('この記録を削除しますか？')) return;
  await deleteFromDB(currentDetailId);
  entries = entries.filter(function(e) { return e.id !== currentDetailId; });
  closeDetail();
  render();
}

function previewCover(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    window._newCover = e.target.result;
    var prev = document.getElementById('coverPreview');
    prev.src = e.target.result;
    document.getElementById('coverPreviewWrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

load();
</script>
</body>
</html>
